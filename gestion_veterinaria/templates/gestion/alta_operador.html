{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alta de Operador - Administrador</title>
    <link rel="stylesheet" href="{% static 'gestion/css/estilos.css' %}">
</head>
<body>
    <div class="panel-container">
        <main class="form-wrapper">
            <div class="form-card" style="max-width: 550px;">
                <div class="card-header">
                    <h2>Nuevo Personal de Recepción</h2>
                    <p class="subtitle">Asigná las credenciales para el nuevo operador</p>
                </div>
                
                <form method="post" class="custom-form">
                    {% csrf_token %}
                    <div class="django-form-fields">
                        {{ form.as_p }}
                    </div>
                    <div class="form-actions" style="margin-top: 30px;">
                        <button type="submit" class="btn-primary" style="background-color: #10b981;">Guardar y Crear Usuario</button>
                        <a href="{% url 'gestion_operadores' %}" class="btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
