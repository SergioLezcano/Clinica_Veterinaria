{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Preconsulta - Recepción</title>
    <link rel="stylesheet" href="{% static 'gestion/css/estilos.css' %}?v=10">
</head>
<body>
    <div class="panel-container">
        <header class="panel-header">
            <div class="user-info">
                <span>Operador: <strong>{{ user.username }}</strong></span>
                <span class="badge-permiso">Inicio de Atención</span>
            </div>
            <form action="{% url 'logout' %}" method="post">{% csrf_token %}<button type="submit" class="btn-logout">Cerrar Sesión</button></form>
        </header>

        <main class="form-wrapper">
            <div class="form-card">
                <div class="card-header">
                    <h2>Nueva Preconsulta</h2>
                    <p class="subtitle">Registrá los datos vitales para el médico</p>
                </div>
                <form method="post" class="custom-form">
                    {% csrf_token %}
                    <div class="django-form-fields">
                        {{ form.as_p }}
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary" style="background-color: #0ea5e9;">Enviar a Consultorio</button>
                        <a href="{% url 'menu_operador' %}" class="btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
